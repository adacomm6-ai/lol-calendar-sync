name: Refresh iPhone Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest calendar snapshot
        run: curl -fsSL "https://lol-calendar-sync.vercel.app/calendar.ics" -o iphone-calendar.ics

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- iphone-calendar.ics; then
            echo "No calendar changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add iphone-calendar.ics
          git commit -m "chore: refresh iphone calendar snapshot"
          git push
